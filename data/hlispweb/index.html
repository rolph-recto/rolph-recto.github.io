<!DOCTYPE html>
<html>
  <head>
    <!-- ghcjs -->
    <script language="javascript" src="rts.js"></script>
    <script language="javascript" src="lib.js"></script>
    <script language="javascript" src="out.js"></script>

    <!-- jquery -->
    <script type="text/javascript" src="http://code.jquery.com/jquery-1.7.2.min.js"></script>
    <script type="text/javascript" src="http://terminal.jcubic.pl/js/jquery.mousewheel-min.js"></script>
    <script type="text/javascript" src="http://terminal.jcubic.pl/js/jquery.terminal-0.4.22.min.js"></script>
    <link rel="stylesheet" href="http://terminal.jcubic.pl/css/jquery.terminal.css">
    <style>
    html, body, #term {
      height: 100%;
      margin: 0;
      font-size: 150%;
      font-family: monospace;
    }
    .terminal-output, .cmd{
      font-size: 1.2em !important;
      line-height: 1.2em !important;
    }
    /*
    .terminal div{
      margin-bottom: 5px;    
    }
    */
    </style>
  </head>
  <body>
    <div id="terminal">
    </div>
  </body>
  <script language="javascript" src="runmain.js" defer></script>
  <script>
    jQuery(function ($) {

        $('#terminal').terminal(function(command, term) {
          // a hack to get print statements to print on the terminal
          console.log = term.echo;

          var ret = hlisp(command);
          term.echo(ret);
        }, {
            greetings: "HLisp v0.1.0\nType 'help' for a list of available commands.",
            name: "hlisp",
            height: $("body").height()-20,
            prompt: ">> "
        });
    });
  </script>
</html>
